# Cloud Build configuration for GCP Cloud Run deployment
# triggers: https://console.cloud.google.com/cloud-build/triggers

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pg-manager:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/pg-manager:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
    id: 'build'

  # Step 2: Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/pg-manager:$COMMIT_SHA'
    id: 'push-sha'
    waitFor:
      - 'build'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/pg-manager:latest'
    id: 'push-latest'
    waitFor:
      - 'build'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pg-manager'
      - '--image'
      - 'gcr.io/$PROJECT_ID/pg-manager:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXTAUTH_URL=https://your-domain.com'
    id: 'deploy'
    waitFor:
      - 'push-sha'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/pg-manager:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/pg-manager:latest'

# Build timeout (15 minutes)
timeout: '1200s'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
